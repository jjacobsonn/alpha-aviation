# Railway config for the API service (use with Root Directory = backend).
# Dashboard → Settings → Config file path: /backend/railway.toml
[build]
buildCommand = "pip install poetry && poetry config virtualenvs.create false && poetry install"

[deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/health/"
